<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 1</title>
    <script>
        // Код обгорнуто у функцію
        function processName() {
            let surname = prompt("Введіть ваше прізвище:", "");
            let name = prompt("Введіть ваше ім'я:", "");
            let patronymic = prompt("Введіть по-батькові:", "");

            if (surname && name && patronymic) {
                let isCorrect = confirm(`Ваші дані: ${surname} ${name} ${patronymic}\nВсе вірно?`);
                if (isCorrect) {
                    alert(`Добрий день, ${surname} ${name} ${patronymic}!`);
                } else {
                    alert("Помилка: Дані не підтверджено.");
                }
            } else {
                alert("Помилка: Ви ввели не всі дані.");
            }
        }
    </script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Завдання 1</h2>
    <a href="index.html">Повернутися до меню</a><br><br>
    
    <button onclick="processName()" style="padding: 10px 20px; font-size: 16px;">Ввести дані</button>
</body>
</html>
